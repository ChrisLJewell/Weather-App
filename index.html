<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="style/weather.css">

</head>

<body>

    <h1> TrueForecast</h1>

    <form id="weatherForm">
        <label for="cityName"> City: </label>
        <input type="Search" name="cityName" id="cityName">
        <input type="submit" value="Search">
    </form>
    


    <!-- Rounded switch-->
    <label class="switch">
        <input type="checkbox" id="tempToggle">
        <span class="slider round"></span>
    </label>
    <!--End Rounded switch-->



<div class = "current-forcast-container">  
    <p>Current weather </p> 
    <h3 id="displayLocation">  </h3>
    <h2 id="temperature"></h2>
    <img id = icon>
    <p id="weatherDescription"></p>
    <p id="humidity"> </p>
    <p id="feelsLike"></p>
    <p id="wind"></p>
</div>



    <div class="forecast-container"> </div>




</body>
